<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scavenger Hunt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000000;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #000000;
      padding: 30px;
      border-radius: 0px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 0px rgba(0,0,0,0);
    }

    input {
      padding: 10px;
      width: 70%;
      border-radius: 0px;
      border: none;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Password 1</h1>
  <input id="codeInput1" type="text" placeholder="Enter">

  <div id="clue1" class="hidden">
    <h2>Clue 1 Revealed</h2>
    <p>Clue 1 Showing"</p>

    <input id="codeInput2" type="text" placeholder="Enter">
  </div>

  <div id="clue2" class="hidden">
    <h2>Clue 2 Revealed</h2>
    <p>Clue 2 Showing"</p>

    <input id="codeInput3" type="text" placeholder="Enter">
  </div>

  <div id="finalPage" class="hidden">
    <h1>Clue 3 Revealed</h1>
    <p>Clue 3 Showing</p>
  </div>
</div>

<script>
  function checkCode1() {
    const input = document.getElementById("codeInput1").value.toLowerCase();
    if (input === "firstcode") {
      document.getElementById("clue1").classList.remove("hidden");
      document.getElementById("codeInput2").focus();
    } else {
      alert("Incorect, Try Again");
    }
  }

  function checkCode2() {
    const input = document.getElementById("codeInput2").value.toLowerCase();
    if (input === "secondcode") {
      document.getElementById("clue2").classList.remove("hidden");
      document.getElementById("codeInput3").focus();
    } else {
      alert("Incorect, Try Again");
    }
  }

  function checkCode3() {
    const input = document.getElementById("codeInput3").value.toLowerCase();
    if (input === "finalcode") {
      document.getElementById("finalPage").classList.remove("hidden");
    } else {
      alert("Incorect, Try Again");
    }
  }

  // ENTER KEY LISTENERS
  document.getElementById("codeInput1").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      checkCode1();
    }
  });

  document.addEventListener("keypress", function(e) {
    if (e.target.id === "codeInput2" && e.key === "Enter") {
      checkCode2();
    }
    if (e.target.id === "codeInput3" && e.key === "Enter") {
      checkCode3();
    }
  });
</script>

</body>
</html>
