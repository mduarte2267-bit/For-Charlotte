<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scavenger Hunt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      padding: 10px;
      width: 70%;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    .error {
      color: #f87171;
      margin-top: 5px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Enter Your Code 💌</h1>
  <input id="codeInput1" type="text" placeholder="Enter first code">
  <p id="error1" class="error"></p>

  <div id="clue1" class="hidden">
    <h2>Clue 1 Revealed ❤️</h2>
    <p>Your next clue: "Where we first laughed together"</p>

    <input id="codeInput2" type="text" placeholder="Enter second code">
    <p id="error2" class="error"></p>
  </div>

  <div id="clue2" class="hidden">
    <h2>Clue 2 Revealed 💖</h2>
    <p>Your next clue: "The place we couldn't stop smiling"</p>

    <input id="codeInput3" type="text" placeholder="Enter third code">
    <p id="error3" class="error"></p>
  </div>

  <div id="finalPage" class="hidden">
    <h1>🎉 You Made It! 🎉</h1>
    <p>This is the next part of your scavenger hunt...</p>
  </div>
</div>

<script>
  function checkCode1() {
    const input = document.getElementById("codeInput1").value.toLowerCase();
    if (input === "firstcode") {
      document.getElementById("clue1").classList.remove("hidden");
      document.getElementById("codeInput2").focus();
      document.getElementById("error1").textContent = "";
    } else {
      document.getElementById("error1").textContent = "Incorrect, try again 💔";
    }
  }

  function checkCode2() {
    const input = document.getElementById("codeInput2").value.toLowerCase();
    if (input === "secondcode") {
      document.getElementById("clue2").classList.remove("hidden");
      document.getElementById("codeInput3").focus();
      document.getElementById("error2").textContent = "";
    } else {
      document.getElementById("error2").textContent = "Incorrect, try again 💭";
    }
  }

  function checkCode3() {
    const input = document.getElementById("codeInput3").value.toLowerCase();
    if (input === "finalcode") {
      document.getElementById("finalPage").classList.remove("hidden");
      document.getElementById("error3").textContent = "";
    } else {
      document.getElementById("error3").textContent = "Almost there... try again ❤️";
    }
  }

  // ENTER KEY LISTENERS
  document.getElementById("codeInput1").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      checkCode1();
    }
  });

  document.addEventListener("keypress", function(e) {
    if (e.target.id === "codeInput2" && e.key === "Enter") {
      checkCode2();
    }
    if (e.target.id === "codeInput3" && e.key === "Enter") {
      checkCode3();
    }
  });
</script>

</body>
</html>
