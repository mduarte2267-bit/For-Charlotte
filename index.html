<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scavenger Hunt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000000;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #265ab5;
      padding: 30px;
      border-radius: 0px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      padding: 10px;
      width: 70%;
      border-radius: 0px;
      border: none;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 0px;
      background: #3026b5;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Code1</h1>
  <input id="codeInput1" type="text" placeholder="Enter">
  <br>
  <button onclick="checkCode1()">Submit</button>

  <div id="clue1" class="hidden">
    <h2>Clue1</h2>
    <p>Your next clue: "Clue2"</p>

    <input id="codeInput2" type="text" placeholder="Enter">
    <br>
    <button onclick="checkCode2()">Submit</button>
  </div>

  <div id="clue2" class="hidden">
    <h2>Clue2</h2>
    <p>Your next clue: "Clue2"</p>

    <input id="codeInput3" type="text" placeholder="Enter">
    <br>
    <button onclick="checkCode3()">Submit</button>
  </div>

  <div id="clue4" class="hidden">
    <h1>clue4</h1>
    <p>clue4</p>
  </div>
</div>

<script>
  function checkCode1() {
    const input = document.getElementById("codeInput1").value.toLowerCase();
    if (input === "firstcode") {
      document.getElementById("clue1").classList.remove("hidden");
    } else {
      alert("Incorect Code");
    }
  }

  function checkCode2() {
    const input = document.getElementById("codeInput2").value.toLowerCase();
    if (input === "secondcode") {
      document.getElementById("clue2").classList.remove("hidden");
    } else {
      alert("Incorect Code");
    }
  }

  function checkCode3() {
    const input = document.getElementById("codeInput3").value.toLowerCase();
    if (input === "finalcode") {
      document.getElementById("finalPage").classList.remove("hidden");
    } else {
      alert("Incorect Code");
    }
  }
</script>

</body>
</html>
